<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Luxury Car Rental</title>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;500;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Poppins',sans-serif;}
body{background:#0f2027;background:linear-gradient(to right,#0f2027,#203a43,#2c5364);color:#fff;}
header{display:flex;justify-content:space-between;align-items:center;padding:20px 60px;background:rgba(0,0,0,0.6);position:sticky;top:0;}
header h1{color:#00e5ff;}
nav a{margin:0 15px;color:#fff;text-decoration:none;transition:0.3s;}
nav a:hover{color:#00e5ff;}
.hero{height:90vh;background:url('https://images.unsplash.com/photo-1503376780353-7e6692767b70?auto=format&fit=crop&w=1600&q=80') no-repeat center/cover;display:flex;flex-direction:column;justify-content:center;align-items:center;text-align:center;}
.hero h2{font-size:60px;text-shadow:0 0 20px black;}
.hero p{margin:20px;font-size:20px;}
.btn{padding:15px 30px;background:#00e5ff;color:#000;border:none;border-radius:30px;font-size:18px;cursor:pointer;transition:0.3s;}
.btn:hover{background:#fff;}
.section{padding:60px;text-align:center;}
.cards{display:flex;gap:30px;justify-content:center;flex-wrap:wrap;margin-top:40px;}
.card{background:rgba(255,255,255,0.1);backdrop-filter:blur(10px);border-radius:20px;overflow:hidden;width:300px;transition:0.4s;box-shadow:0 10px 30px rgba(0,0,0,0.5);}
.card:hover{transform:translateY(-15px) scale(1.05);}
.card img{width:100%;height:200px;object-fit:cover;}
.card h3{margin:15px;}
.card p{margin-bottom:15px;color:#00e5ff;font-weight:bold;}
.form-box{max-width:400px;margin:auto;background:rgba(255,255,255,0.1);padding:30px;border-radius:20px;backdrop-filter:blur(10px);box-shadow:0 0 20px rgba(0,0,0,0.5);}
input,select{width:100%;padding:12px;margin:10px 0;border:none;border-radius:10px;}
footer{text-align:center;padding:20px;background:rgba(0,0,0,0.6);margin-top:40px;}
</style>
</head>
<body>

<header>
<h1>DriveX</h1>
<nav>
<a href="#home">Home</a>
<a href="#cars">Cars</a>
<a href="#book">Book</a>
</nav>
</header>

<section class="hero" id="home">
<h2>Drive Your Dream Car</h2>
<p>Luxury • Comfort • Performance</p>
<button class="btn" onclick="document.getElementById('cars').scrollIntoView()">Explore Cars</button>
</section>

<section class="section" id="cars">
<h2>Our Premium Cars</h2>
<div class="cards">
<div class="card">
<img src="https://images.unsplash.com/photo-1580273916550-e323be2ae537?auto=format&fit=crop&w=1200&q=80" alt="BMW Car">
<h3>BMW</h3>
<p>₹4000/day</p>
</div>
<div class="card">
<img src="https://images.unsplash.com/photo-1502877338535-766e1452684a?auto=format&fit=crop&w=800&q=80" alt="Audi Car">
<h3>Audi</h3>
<p>₹5000/day</p>
</div>
<div class="card">
  <img src="https://upload.wikimedia.org/wikipedia/commons/9/90/2018_Mercedes-Benz_S_560_e_AMG_Line_Automatic_3.0.jpg" width="300">
  <h3>Mercedes</h3>
  <p>₹7000/day</p>
</div>
</div>
</div>
</section>

<section class="section" id="book">
<h2>Book Now</h2>
<div class="form-box">
<input type="text" placeholder="Full Name" required>
<input type="email" placeholder="Email" required>
<select>
<option>Select Car</option>
<option>BMW</option>
<option>Audi</option>
<option>Mercedes</option>
</select>
<input type="date">
<button class="btn">Confirm Booking</button>
</div>
</section>

<footer>
<p>© 2026 DriveX Luxury Rentals</p>
</footer>

</body>
</html>
